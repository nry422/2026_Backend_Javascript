<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salvamento local</title>
</head>

<body>
    <script>

        let idade = Number(localStorage.getItem("idade")) || Number(prompt("Digite sua idade:")); //se tem valor em storage ele usa, senao ele pede!
        let soma = idade + 1;
        localStorage.setItem("idade", soma); //guarda o valor
        alert(soma);

    </script>

</body>

</html>
