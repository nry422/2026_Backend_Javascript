<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>switch case 01</title>
</head>

<body>
    <script>
        const numero = Number(prompt("numero para ser verificado: "));
        let imparpar;
        switch (numero % 2) {
            case 0:            
                imparpar = "numero par";
                break;            
            case 1:
                imparpar = "numero impar";
                break;       


        }
        alert(`O valor é ${imparpar}`);
    </script>


</body>

</html>
