<script>
    let num //declara variavel num com let, pois ela pode ser alterada
    // e sera acessada fora do blodo do... while

    do {        //cria laco de repeticao (faça...)
        num = Number(prompt("Numero: ")) // le numero
        if (num == 0 || isNaN(num)) { // se num é invalido
            alert("Digite um número válido...")
        }
    } while (num == 0 || isNaN(num))  //.... equanto num invalido
    let pares = `Pares entre 1 e ${num}: `   // string que ira conter a resposta
    for (let i = 2; i <= num; i = i + 2) {
        pares = pares + i + ", "
    }
    alert(pares)   //exibe lista dos numeros pares





</script>
